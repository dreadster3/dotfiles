log_level = "warn"
position = "Top"

[modules]
left = [["appLauncher", "Workspaces"]]
center = ["Clock"]
right = ["SystemInfo", "MediaPlayer", ["Tray", "Privacy", "Settings"]]

[workspaces]
visibility_mode = "MonitorSpecificExclusive"
group_by_monitor = true
enable_workspace_filling = true

[[CustomModule]]
name = "appLauncher"
icon = "󱗼"
command = "pkill rofi | rofi -show drun"

[window_title]
mode = "Title"
truncate_title_after_length = 100

[system_info]
indicators = ["Cpu", "Memory", "Temperature"]
interval = 5

[system_info.cpu]
warn_threshold = 60
alert_threshold = 80

[system_info.memory]
warn_threshold = 70
alert_threshold = 85

[system_info.temperature]
warn_threshold = 60
alert_threshold = 80
sensor = "acpitz temp1"

[tempo]
clock_format = "%a %d %b %R"
timezones = ["Europe/Lisbon"]
weather_location = { City = "Lisbon" }
weather_indicator = "IconAndTemperature"

[media_player]
indicator_format = "IconAndTitle"
max_title_length = 50

[settings]
lock_cmd = "loginctl lock-session"
suspend_cmd = "systemctl suspend"
hibernate_cmd = "systemctl hibernate"
reboot_cmd = "systemctl reboot"
logout_cmd = "loginctl terminate-session"

audio_sinks_more_cmd = "pavucontrol -t 3"
audio_sources_more_cmd = "pavucontrol -t 4"
wifi_more_cmd = "nm-connection-editor"
vpn_more_cmd = "nm-connection-editor"
bluetooth_more_cmd = "blueberry"
battery_format = "IconAndPercentage"
peripheral_battery_format = "Icon"
audio_indicator_format = "Icon"
microphone_indicator_format = "Icon"
network_indicator_format = "Icon"
bluetooth_indicator_format = "Icon"
brightness_indicator_format = "Icon"
indicators = [
  "IdleInhibitor",
  "PowerProfile",
  "Audio",
  "Bluetooth",
  "Network",
  "Vpn",
  "Battery",
]


[appearance]
success_color = "#a6e3a1"
text_color = "#cdd6f4"

workspace_colors = ["#cba6f7", "#b4befe"]
special_workspace_colors = ["#cba6f7", "#a6e3a1"]

[appearance.primary_color]
base = "#fab387"
text = "#1e1e2e"

[appearance.danger_color]
base = "#f38ba8"
weak = "#f9e2af"

[appearance.background_color]
base = "#1e1e2e"
weak = "#313244"
strong = "#45475a"

[appearance.secondary_color]
base = "#11111b"
strong = "#1b1b25"
